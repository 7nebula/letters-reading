    --ink-dim:#8A7A6E;
    --bg:#FDF1E7;
    --bg-deep:#F8DDD0;
    --card:#FFFFFF;
    --card-soft:#FFF7F0;
    --line:#F2DCC9;
    --gold:#E8A93F;
    --gold-soft:rgba(232,169,63,0.18);
    --sage:#F49AB0;
    --sage-soft:rgba(244,154,176,0.16);
    --weekend:#FDE9EE;

  *{box-sizing:border-box;}

    margin:0;

      radial-gradient(circle at 90% 10%, #FDEFDA 0%, transparent 40%),

    padding-bottom:60px;

  header{ text-align:center; margin-bottom:22px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px; letter-spacing:.18em; color:var(--sage);
    text-transform:uppercase; margin-bottom:10px;
  }
  h1{

    font-weight:400;

/* ---------------- STATE ---------------- */
let checksAll = {};      // { name: { "07-13": true, ... } }
let currentName = "";

function todayKey(){
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return mm+"-"+dd;
}

/* ---------------- STORAGE ----------------
   공유 데이터(checksAll)는 Firebase Realtime Database에 저장됩니다.
   개인 설정(내 이름 선택)은 이 브라우저에만 저장되면 되므로 localStorage를 사용합니다.
--------------------------------------------- */
async function loadAllOnce(){
  if(!firebaseReady) return checksAll; // 데모 모드: 메모리에 있는 값 그대로 사용
  try{
    const snap = await checksRef.once('value');
    return snap.val() || {};
  }catch(e){
    setStatus("불러오기에 실패했어요.");
    return {};
  }
}

async function saveToggle(name, key, newVal){
  if(!firebaseReady){
    // 데모 모드: 메모리에만 반영 (새로고침하면 초기화됨)
    if(!checksAll[name]) checksAll[name] = {};
    checksAll[name][key] = newVal;
    return true;
  }
  try{
    await checksRef.child(name).child(key).set(newVal);
    return true;
  }catch(e){
    setStatus("저장에 실패했어요. 다시 시도해 주세요.");
    return false;
  }
}

function loadMyName(){
  try{ return localStorage.getItem('my_name') || ""; }catch(e){ return ""; }
}
function saveMyName(name){
  try{ localStorage.setItem('my_name', name); }catch(e){}
}

function setStatus(msg){
  document.getElementById('statusLine').textContent = msg;
  if(msg) setTimeout(()=>{ document.getElementById('statusLine').textContent=''; }, 3000);
}

/* ---------------- COMPUTE ---------------- */
function countFor(name){
  const rec = checksAll[name] || {};
  return schedule.reduce((acc,[key]) => acc + (rec[key] ? 1 : 0), 0);
}
function overallCount(){
  return ALL_NAMES.reduce((acc,n) => acc + countFor(n), 0);
}

/* ---------------- RENDER: HEADER RING ---------------- */
function renderRing(){
  const total = TOTAL_PEOPLE * TOTAL_DAYS;
  const done = overallCount();
  const pct = total ? Math.round((done/total)*100) : 0;
  const circumference = 232.5;
  const offset = circumference - (circumference * pct / 100);
  document.getElementById('ringFill').setAttribute('stroke-dashoffset', offset);
  document.getElementById('overallPctText').textContent = pct + "%";
  document.getElementById('overallCountText').textContent = `${done} / ${total} 회 체크됨`;
}

/* ---------------- RENDER: CHECKLIST ---------------- */
function populateSelect(){
  const sel = document.getElementById('nameSelect');
  sel.innerHTML = '<option value="">내 이름 선택하기</option>';
  Object.entries(teams).forEach(([team, list])=>{
    const og = document.createElement('optgroup');
    og.label = team;
    list.forEach(n=>{
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });
}

function renderChecklist(){
  const empty = document.getElementById('checklistEmpty');
  const body = document.getElementById('checklistBody');
  const meBox = document.getElementById('meProgressBox');

  if(!currentName){
    empty.style.display = 'block';
    body.innerHTML = '';
    meBox.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  meBox.style.display = 'block';

  const count = countFor(currentName);
  document.getElementById('meBarFill').style.width = (count/TOTAL_DAYS*100)+"%";
  document.getElementById('meCountText').textContent = `${count} / ${TOTAL_DAYS}`;

  const rec = checksAll[currentName] || {};
  const tKey = todayKey();
  let html = '';
  let lastMonth = '';
  schedule.forEach(([key, dow, passage])=>{
    const month = key.slice(0,2);
    if(month !== lastMonth){
      html += `<div class="month-label">${parseInt(month)}월</div>`;
      lastMonth = month;
    }
    const isWeekend = (dow === '토' || dow === '일');
    const isToday = (key === tKey);
    const checked = !!rec[key];
    html += `
      <div class="day-row ${isWeekend ? 'weekend':''} ${isToday ? 'today':''}">
        <div class="date-badge">${key.replace('-','/')}<span class="dow">${dow}</span></div>
        <div class="passage">${passage}${isToday ? '<span class="today-tag">오늘</span>' : ''}</div>
        <button class="stamp ${checked?'checked':''}" data-key="${key}">${checked?'✓':''}</button>
      </div>`;
  });
  body.innerHTML = html;

  body.querySelectorAll('.stamp').forEach(btn=>{
    btn.addEventListener('click', ()=> onToggle(btn.dataset.key));
  });

  const todayEl = body.querySelector('.day-row.today');
  if(todayEl && !renderChecklist._scrolled){
    todayEl.scrollIntoView({block:'center', behavior:'smooth'});
    renderChecklist._scrolled = true;
  }
}

async function onToggle(key){
  if(!currentName) return;
  const currentVal = !!(checksAll[currentName] && checksAll[currentName][key]);
  const newVal = !currentVal;

  // 화면은 즉시 반영 (낙관적 업데이트)
  if(!checksAll[currentName]) checksAll[currentName] = {};
  checksAll[currentName][key] = newVal;
  renderChecklist();
  renderRing();

  const ok = await saveToggle(currentName, key, newVal);
  if(!ok){
    // 실패 시 되돌리기
    checksAll[currentName][key] = currentVal;
    renderChecklist();
    renderRing();
  }
}

/* ---------------- RENDER: TEAMS ---------------- */
function renderTeams(){
  const body = document.getElementById('teamsBody');
  let html = '';
  Object.entries(teams).forEach(([team, list])=>{
    const teamDone = list.reduce((acc,n)=>acc+countFor(n),0);
    const teamPct = Math.round((teamDone/(list.length*TOTAL_DAYS))*100);
    html += `<div class="team-card">
      <div class="team-head"><div class="name">${team}</div><div class="pct">${teamPct}%</div></div>`;
    list.forEach(n=>{
      const c = countFor(n);
      const pct = Math.round((c/TOTAL_DAYS)*100);
      html += `
        <div class="member-row" data-name="${n}">
          <div class="mname">${n}</div>
          <div class="mbar-track"><div class="mbar-fill" style="width:${pct}%"></div></div>
          <div class="mpct">${pct}%</div>
        </div>`;
    });
    html += `</div>`;
  });
  body.innerHTML = html;
  body.querySelectorAll('.member-row').forEach(row=>{
    row.addEventListener('click', ()=>{
      const n = row.dataset.name;
      document.getElementById('nameSelect').value = n;
      currentName = n;
      saveMyName(n);
      switchTab('checklist');
      renderChecklist();
    });
  });
}

/* ---------------- RENDER: PROGRESS ---------------- */
function renderProgress(){
  const teamBars = document.getElementById('teamBars');
  let barsHtml = '';
  Object.entries(teams).forEach(([team, list])=>{
    const teamDone = list.reduce((acc,n)=>acc+countFor(n),0);
    const teamTotal = list.length*TOTAL_DAYS;
    const pct = Math.round((teamDone/teamTotal)*100);
    barsHtml += `
      <div class="team-bar-row">
        <div class="tlabel"><b>${team}</b><span>${pct}%</span></div>
        <div class="team-bar-track"><div class="team-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  });
  teamBars.innerHTML = barsHtml;

  const ranked = ALL_NAMES.map(n=>({
    name:n, team:nameToTeam[n], count:countFor(n),
    pct: Math.round((countFor(n)/TOTAL_DAYS)*100)
  })).sort((a,b)=> b.count - a.count);

  const rankBody = document.getElementById('rankBody');
  rankBody.innerHTML = ranked.map((r,i)=>`
    <tr>
      <td class="rk">${i+1}</td>
      <td>${r.name}</td>
      <td>${r.team}</td>
      <td>${r.count}/${TOTAL_DAYS}</td>
      <td class="pct">${r.pct}%</td>
    </tr>`).join('');
}

/* ---------------- TABS ---------------- */
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=> p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab === 'teams') renderTeams();
  if(tab === 'progress') renderProgress();
}

/* ---------------- REFRESH (수동) ---------------- */
async function refreshData(){
  setStatus("불러오는 중…");
  checksAll = await loadAllOnce();
  renderRing();
  renderChecklist();
  const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
  if(activeTab === 'teams') renderTeams();
  if(activeTab === 'progress') renderProgress();
  setStatus(firebaseReady ? "최신 상태로 업데이트했어요" : "데모 모드입니다");
}

/* ---------------- INIT ---------------- */
(async function init(){
  if(!firebaseReady){
    document.getElementById('demoBanner').classList.add('show');
  }

  populateSelect();
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click', ()=> switchTab(b.dataset.tab));
  });
  document.getElementById('refreshBtn').addEventListener('click', refreshData);
  document.getElementById('refreshBtn2').addEventListener('click', refreshData);

  document.getElementById('nameSelect').addEventListener('change', (e)=>{
    currentName = e.target.value;
    saveMyName(currentName);
    renderChecklist._scrolled = false;
    renderChecklist();
  });

  checksAll = await loadAllOnce();
  renderRing();

  const saved = loadMyName();
  if(saved && ALL_NAMES.includes(saved)){
    currentName = saved;
    document.getElementById('nameSelect').value = saved;
  }
  renderChecklist();

  // 실시간 동기화: 다른 사람이 체크하면 화면이 자동으로 갱신됩니다
  if(firebaseReady){
    checksRef.on('value', (snap)=>{
      checksAll = snap.val() || {};
      renderRing();
      renderChecklist();
      const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
      if(activeTab === 'teams') renderTeams();
      if(activeTab === 'progress') renderProgress();
    });
  }
})();
</script>
